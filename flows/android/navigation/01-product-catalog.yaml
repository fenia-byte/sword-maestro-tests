appId: com.saucelabs.mydemoapp.android
---
# TC-NAV-01: Catalog loads with at least one visible product
- launchApp:
    clearState: true
- waitForAnimationToEnd

- runFlow: ../../shared/helpers/android-dismiss-popup-helper.yaml

- assertVisible: "Products"
- assertVisible: "Sauce Labs Backpack"
- assertVisible: "$ 29.99"