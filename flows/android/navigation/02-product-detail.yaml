appId: com.saucelabs.mydemoapp.android
---
# TC-NAV-02: Product detail shows name, price, description; back returns to catalog
- launchApp:
    clearState: true
- waitForAnimationToEnd

- runFlow: ../../shared/helpers/android-dismiss-popup-helper.yaml

- assertVisible: "Products"
- tapOn:
    id: "com.saucelabs.mydemoapp.android:id/productIV"
- waitForAnimationToEnd

- assertVisible: "Sauce Labs Backpack"
- assertVisible: "$ 29.99"
- assertVisible: "Add to cart"
- scroll
- assertVisible: "Product Highlights"

- pressKey: Back
- waitForAnimationToEnd
- assertVisible: "Products"
- assertVisible: "Sauce Labs Backpack"