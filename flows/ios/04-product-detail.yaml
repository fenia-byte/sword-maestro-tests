appId: com.saucelabs.mydemo.app.ios
---
# TC-NAV-02: Product detail screen shows name, price, description (iOS)
# Asserts back navigation returns to catalog with state preserved
- launchApp:
    clearState: true
- waitForAnimationToEnd

- runFlow: ../shared/helpers/ios-login-helper.yaml

- tapOn:
    id: "ProductItem"
    index: 0
- waitForAnimationToEnd

- assertVisible: "Add to cart"
- assertVisible: "$ 29.99"

# Back navigation returns to catalog
- tapOn:
    id: "BackButton Icons"
- waitForAnimationToEnd
- assertVisible:
    id: "ProductItem"