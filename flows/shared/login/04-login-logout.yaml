appId: com.saucelabs.mydemoapp.android
---
- launchApp:
    clearState: true

- waitForAnimationToEnd

- tapOn:
    text: "Don't Show Again"
    optional: true

- waitForAnimationToEnd

# Navigate to login
- tapOn:
    id: "com.saucelabs.mydemoapp.android:id/menuIV"
- tapOn: "Log In"
- waitForAnimationToEnd

# Login with valid credentials
- tapOn:
    id: "com.saucelabs.mydemoapp.android:id/nameET"
- inputText: "bod@example.com"

- tapOn:
    id: "com.saucelabs.mydemoapp.android:id/passwordET"
- inputText: "10203040"

- tapOn:
    id: "com.saucelabs.mydemoapp.android:id/loginBtn"
- waitForAnimationToEnd

- assertVisible: "Products"

# Logout via menu
- tapOn:
    id: "com.saucelabs.mydemoapp.android:id/menuIV"
- tapOn: "Log Out"
- tapOn: "LOGOUT"
- waitForAnimationToEnd

# Assert session is cleared - back to login
- assertVisible: "Login"