appId: com.saucelabs.mydemoapp.android
---
- launchApp:
    clearState: true

- waitForAnimationToEnd

- tapOn:
    text: "Don't Show Again"
    optional: true

- waitForAnimationToEnd

- tapOn:
    id: "com.saucelabs.mydemoapp.android:id/menuIV"
- tapOn: "Log In"
- waitForAnimationToEnd

# Test 1: Both fields empty - only username validated
- tapOn:
    id: "com.saucelabs.mydemoapp.android:id/loginBtn"
- waitForAnimationToEnd
- assertVisible: "Username is required"

# Test 2: Username filled, password empty
- tapOn:
    id: "com.saucelabs.mydemoapp.android:id/nameET"
- inputText: "bod@example.com"
- tapOn:
    id: "com.saucelabs.mydemoapp.android:id/loginBtn"
- waitForAnimationToEnd
- assertVisible: "Enter Password"